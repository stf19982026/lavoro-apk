name: Costruisci APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write   # serve per pubblicare la Release con l'APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Installa Flet
        run: pip install flet

      # flet build scarica da solo la versione di Flutter che gli serve;
      # gli rispondiamo "sì" in automatico (niente tastiera in CI).
      - name: Costruisci APK
        run: |
          for i in $(seq 200); do echo y; done > yes.txt
          flet build apk --verbose < yes.txt

      - name: Raccogli l'APK
        run: |
          mkdir -p out
          find build -name "*.apk" -exec cp {} out/ \;
          ls -la out

      - name: Carica come artifact (scaricabile dal tab Actions)
        uses: actions/upload-artifact@v4
        with:
          name: rassegna-apk
          path: out/*.apk

      - name: Pubblica come Release (scaricabile dal telefono)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Rassegna Lavoro — APK
          files: out/*.apk
