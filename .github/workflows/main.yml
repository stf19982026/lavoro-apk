name: Costruisci APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write   # serve per pubblicare la Release con l'APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android SDK components and accept licenses
        run: |
          set -e
          # Accept licenses (may return non-zero; continue to ensure licenses are accepted)
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --licenses || true
          # Install commonly required SDK components for Flutter / Flet packaging
          $ANDROID_SDK_ROOT/tools/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Prepare Python packaging tools and install Flet
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m pip install --upgrade flet

      - name: Run Flutter doctor (verbose)
        run: |
          flutter doctor -v || true
          flutter doctor --android-licenses || true

      - name: Costruisci APK
        run: echo "y" | flet build apk --verbose

      - name: Raccogli l'APK
        run: |
          mkdir -p out
          find build -name "*.apk" -exec cp {} out/ \;
          ls -la out

      - name: Carica come artifact (scaricabile dal tab Actions)
        uses: actions/upload-artifact@v4
        with:
          name: rassegna-apk
          path: out/*.apk

      - name: Pubblica come Release (scaricabile dal telefono)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Rassegna Lavoro — APK
          files: out/*.apk
